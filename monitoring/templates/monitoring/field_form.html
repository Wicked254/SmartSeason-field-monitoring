{% extends 'base.html' %}

{% block content %}
  <div class="card" style="max-width: 720px;">
    <h2>{{ title }}</h2>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
        <div class="field">
          <label for="{{ field.id_for_label }}">{{ field.label }}</label>
          {{ field }}
          {% if field.help_text %}<small class="muted">{{ field.help_text }}</small>{% endif %}
          {% for err in field.errors %}<div class="status-at-risk">{{ err }}</div>{% endfor %}
        </div>
      {% endfor %}
      <button type="submit" class="btn">Save</button>
    </form>
  </div>
{% endblock %}
