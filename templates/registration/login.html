{% extends 'base.html' %}

{% block content %}
  <div class="card" style="max-width: 420px; margin: 2rem auto;">
    <h2>Sign In</h2>
    <p class="muted">Use your SmartSeason demo credentials.</p>
    <form method="post">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <div class="field">
        <label for="id_username">Username</label>
        {{ form.username }}
      </div>
      <div class="field">
        <label for="id_password">Password</label>
        {{ form.password }}
      </div>
      <button class="btn" type="submit">Login</button>
    </form>
  </div>
{% endblock %}
