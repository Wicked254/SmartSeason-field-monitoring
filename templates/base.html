<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SmartSeason</title>
    <style>
      :root {
        --bg: #f6f8f3;
        --card: #ffffff;
        --ink: #1f2a1f;
        --muted: #637063;
        --brand: #2f7a35;
        --warn: #b45309;
        --done: #166534;
        --ring: #d6e6d1;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--ink); }
      .container { max-width: 980px; margin: 0 auto; padding: 1rem; }
      .nav { background: var(--card); border-bottom: 1px solid var(--ring); }
      .nav-inner { max-width: 980px; margin: 0 auto; padding: 0.75rem 1rem; display: flex; justify-content: space-between; align-items: center; }
      .brand { font-weight: 700; color: var(--brand); text-decoration: none; }
      .actions a, .actions button { margin-left: .75rem; }
      .btn { background: var(--brand); color: #fff; border: 0; padding: 0.5rem 0.8rem; border-radius: 8px; cursor: pointer; text-decoration: none; display: inline-block; }
      .btn.secondary { background: #dfe9dd; color: #1f2a1f; }
      .card { background: var(--card); border: 1px solid var(--ring); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: .8rem; }
      .stat { padding: .9rem; border-radius: 10px; background: #f0f6ed; }
      .status-active { color: var(--brand); font-weight: 600; }
      .status-at-risk { color: var(--warn); font-weight: 600; }
      .status-completed { color: var(--done); font-weight: 600; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: .7rem; border-bottom: 1px solid #e8eee5; }
      input, select, textarea { width: 100%; padding: .55rem; border: 1px solid #d1ddcd; border-radius: 8px; }
      label { font-weight: 600; display: inline-block; margin-bottom: .35rem; }
      .field { margin-bottom: .85rem; }
      .messages { list-style: none; padding: 0; }
      .messages li { background: #e8f5e9; border: 1px solid #b7d8b8; border-radius: 8px; padding: .6rem; margin-bottom: .5rem; }
      .muted { color: var(--muted); }
    </style>
  </head>
  <body>
    {% if user.is_authenticated %}
      <nav class="nav">
        <div class="nav-inner">
          <a href="{% url 'dashboard' %}" class="brand">SmartSeason</a>
          <div class="actions">
            <a href="{% url 'field_list' %}" class="btn secondary">Fields</a>
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
              {% csrf_token %}
              <button type="submit" class="btn secondary">Logout</button>
            </form>
          </div>
        </div>
      </nav>
    {% endif %}

    <main class="container">
      {% if messages %}
        <ul class="messages">
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
